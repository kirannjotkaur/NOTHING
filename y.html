
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiran & Sewak | Our Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

:root{
    --bg:#050505;
    --red:#ff3b5f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* LOCK */

#lockScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:9999;
}

.lock-content{
    width:90%;
    max-width:400px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
}

.lock-content h1{
    font-family:'Great Vibes',cursive;
    font-size:3rem;
    margin-bottom:20px;
}

.password-box{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    outline:none;
    background:#111;
    color:white;
    text-align:center;
}

.enter-btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#ff3b5f,#7a001d);
    color:white;
    cursor:pointer;
}

/* MAIN */

#mainContent{
    display:none;
}

/* HERO */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:50px;
}

.hero h1{
    font-size:5rem;
    font-family:'Playfair Display',serif;
}

.hero h1 span{
    color:var(--red);
}

.hero p{
    margin-top:20px;
    color:#ccc;
    line-height:1.8;
}

.music-btn{
    margin-top:30px;
    padding:14px 30px;
    border:none;
    border-radius:40px;
    background:#111;
    color:white;
    cursor:pointer;
}

/* LETTER */

section{
    padding:120px 8%;
}

.section-title{
    text-align:center;
    margin-bottom:70px;
}

.section-title h2{
    font-size:3rem;
    font-family:'Playfair Display',serif;
}

.letter-card{
    max-width:850px;
    margin:auto;
    padding:50px;
    border-radius:30px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
}

.diary-title{
    font-family:'Great Vibes',cursive;
    font-size:4rem;
    margin-bottom:30px;
}

.typewriter{
    white-space:pre-wrap;
    line-height:2;
    color:#ddd;
    font-size:1rem;
}

/* GALLERY */

.gallery-grid{
    columns:3 250px;
    gap:20px;
}

.gallery-item{
    margin-bottom:20px;
    overflow:hidden;
    border-radius:20px;
}

.gallery-item img{
    width:100%;
    display:block;
    transition:0.5s;
}

.gallery-item:hover img{
    transform:scale(1.05);
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
    font-size:3rem;
}

.section-title h2{
    font-size:2.2rem;
}

.letter-card{
    padding:30px 20px;
}

.diary-title{
    font-size:3rem;
}

}

</style>
</head>

<body>

<!-- LOCK SCREEN -->

<div id="lockScreen">

<div class="lock-content">

<h1>Kiran & Sewak</h1>

<p>Only our hearts know this universe ❤️</p>

<input
type="password"
id="password"
class="password-box"
placeholder="Enter our secret..."
>

<button class="enter-btn" onclick="checkPassword()">
Enter Our Universe
</button>

</div>

</div>

<!-- MAIN -->

<div id="mainContent">

<section class="hero">

<div>

<h1>Kiran <span>&</span> Sewak</h1>

<p>
“Even distance got tired of trying to separate us.”
</p>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
Play Our Song ♫
</button>

</div>

</section>

<!-- LETTER -->

<section>

<div class="section-title">
<h2>Happy Birthday, My Home.</h2>
</div>

<div class="letter-card">

<h1 class="diary-title">To Sewak ❤️</h1>

<div class="typewriter" id="typedText"></div>

</div>

</section>

<!-- GALLERY -->

<section>

<div class="section-title">
<h2>Gallery & Milestones</h2>
</div>

<div class="gallery-grid">

<div class="gallery-item">
<img src="image1.jpg">
</div>

<div class="gallery-item">
<img src="image2.jpg">
</div>

<div class="gallery-item">
<img src="image3.jpg">
</div>

</div>

</section>

</div>

<script>

/* PASSWORD */

function checkPassword(){

    const pass = document.getElementById("password").value;

    if(pass === "Sk@@..11"){

        gsap.to("#lockScreen",{
            opacity:0,
            duration:1,
            onComplete:()=>{

                document.getElementById("lockScreen").style.display="none";
                document.getElementById("mainContent").style.display="block";

                gsap.from("#mainContent",{
                    opacity:0,
                    y:30,
                    duration:1
                });

                typeWriter();

            }
        });

    }else{

        alert("Wrong password ❤️");

    }

}

/* ENTER KEY */

document.getElementById("password")
.addEventListener("keydown",function(e){

    if(e.key === "Enter"){
        checkPassword();
    }

});

/* MUSIC */

const music = document.getElementById("bgMusic");

let playing = false;

function toggleMusic(){

    if(!playing){

        music.play();
        playing = true;

    }else{

        music.pause();
        playing = false;

    }

}

/* TYPEWRITER */

const text = `

Iss saal menu buhot te nhi pata ki bolu
but mein buhot khush hu mere bhugu nal ❤️

I LOVE YOU SEWAK ❤️

Buhot kuch dekhya tuvde nal,
buhot lade,
buhot gussa kita,
but mera home tusi ho.

I feel safe.
I feel happy.

THANK YOU MERE KOL AAN LI ❤️

HAPPY BIRTHDAY SEWU ❤️
`;

let i = 0;

function typeWriter(){

    const target = document.getElementById("typedText");

    target.innerHTML = "";

    function typing(){

        if(i < text.length){

            target.innerHTML += text.charAt(i);

            i++;

            setTimeout(typing,35);

        }

    }

    typing();

}

</script>

</body>
  </html>
